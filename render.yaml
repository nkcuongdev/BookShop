services:
  - type: web
    name: bookshop-api
    runtime: node
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    buildCommand: cd backend && npm ci
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MONGO_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: PAYMENT_MOCK_ENABLED
        value: false
      - key: VNPAY_TMN_CODE
        sync: false
      - key: VNPAY_HASH_SECRET
        sync: false
      - key: VNPAY_PAYMENT_URL
        value: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      - key: VNPAY_RETURN_URL
        sync: false
      - key: MOMO_PARTNER_CODE
        sync: false
      - key: MOMO_ACCESS_KEY
        sync: false
      - key: MOMO_SECRET_KEY
        sync: false
      - key: MOMO_ENDPOINT
        value: https://test-payment.momo.vn/v2/gateway/api/create
      - key: MOMO_REDIRECT_URL
        sync: false
      - key: MOMO_IPN_URL
        sync: false

  - type: web
    name: bookshop-web
    runtime: static
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
